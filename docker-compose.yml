services:
  backend:
    build: .
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: call_center
      DB_USERNAME: call_center
      DB_PASSWORD: call_center
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: callcenter
      REVERB_APP_KEY: local-reverb-key-change-me
      REVERB_APP_SECRET: local-reverb-secret-change-me
      TELEGRAM_FAKE: "true"
      TELEGRAM_WEBHOOK_SECRET: local-secret
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  queue:
    build: .
    working_dir: /var/www/html
    command: php artisan queue:work redis --queue=outbound,default --sleep=1 --tries=1
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: call_center
      DB_USERNAME: call_center
      DB_PASSWORD: call_center
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REVERB_APP_ID: callcenter
      REVERB_APP_KEY: local-reverb-key-change-me
      REVERB_APP_SECRET: local-reverb-secret-change-me
      TELEGRAM_FAKE: "true"
    depends_on:
      - mysql
      - redis

  scheduler:
    build: .
    working_dir: /var/www/html
    command: sh -c 'while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done'
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: call_center
      DB_USERNAME: call_center
      DB_PASSWORD: call_center
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REVERB_APP_ID: callcenter
      REVERB_APP_KEY: local-reverb-key-change-me
      REVERB_APP_SECRET: local-reverb-secret-change-me
    depends_on:
      - mysql
      - redis

  reverb:
    build: .
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: callcenter
      REVERB_APP_KEY: local-reverb-key-change-me
      REVERB_APP_SECRET: local-reverb-secret-change-me
      REDIS_HOST: redis
    depends_on:
      - redis

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_REVERB_APP_KEY: local-reverb-key-change-me
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: 8080
      VITE_REVERB_SCHEME: http
    depends_on:
      - nginx
      - reverb

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: call_center
      MYSQL_USER: call_center
      MYSQL_PASSWORD: call_center
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

volumes:
  mysql-data:
  frontend-node-modules:
