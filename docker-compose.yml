services:
  backend:
    build: .
    working_dir: /var/www/html
    env_file: [".env"]
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      REVERB_HOST: reverb
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  queue:
    build: .
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --queue=outbound,default --sleep=1 --tries=1
    env_file: [".env"]
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      REVERB_HOST: reverb
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    depends_on:
      - mysql
      - redis

  scheduler:
    build: .
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work --verbose --no-interaction
    env_file: [".env"]
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      REVERB_HOST: reverb
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    depends_on:
      - mysql
      - redis

  reverb:
    build: .
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    env_file: [".env"]
    environment:
      REDIS_HOST: redis
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    depends_on:
      - redis

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: ${REVERB_PORT:-8080}
      VITE_REVERB_SCHEME: http
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - nginx
      - reverb

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-call_center}
      MYSQL_USER: ${DB_USERNAME:-call_center}
      MYSQL_PASSWORD: ${DB_PASSWORD:-call_center}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

volumes:
  mysql-data:
  backend-vendor:
  frontend-node-modules:
